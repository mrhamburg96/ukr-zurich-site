<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="profile_juliana_title">Юліана Куранда-Коваль - Профіль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Manrope', sans-serif; background-color: #ffffff; color: #111827; }
        
        .container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 24px; }
        
        /* Панель навигации для кнопки возврата */
        .nav-bar { background-color: #ffffff; border-bottom: 1px solid #e5e7eb; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; color: #1a56c4; text-decoration: none; font-weight: 700; font-size: 14px; transition: transform 0.2s; }
        .btn-back:hover { transform: translateX(-4px); }

        /* Блок с картинкой-лендингом */
        .landing-wrapper { display: flex; justify-content: center; width: 100%; padding: 20px 0 60px 0; }
        .landing-image { width: 100%; max-width: 1000px; height: auto; display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="container">
            <a href="family-center.html" class="btn-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span data-i18n="btn_back_to_center">Повернутися до Центру сім'ї</span>
            </a>
        </div>
    </nav>

    <main class="container">
        <div class="landing-wrapper">
            <img src="juliana_koval.webp" class="landing-image" alt="Юліана Куранда-Коваль">
        </div>
    </main>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const savedLang = localStorage.getItem('selectedLanguage') || 'ua';
        if (typeof applyTranslations === 'function') {
            applyTranslations(savedLang);
        }
    });
    </script>

</body>
</html>
