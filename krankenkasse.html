<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krankenkasse - UAGZ</title>
  <!-- Подключение вашего основного файла стилей -->
  <link rel="stylesheet" href="style.css"> 
  
  <style>
    /* 
      Стили для выстраивания элементов шапки в один ряд.
      Если в вашем основном CSS эти классы уже описаны, вы можете скорректировать их там.
    */
    .header-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      box-sizing: border-box;
      width: 100%;
    }
    
    /* Логотип */
    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      gap: 12px;
    }
    .flags-logo {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .flags-logo img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }
    .brand {
      font-size: 1.4rem;
      font-weight: 800; /* Жирный шрифт */
      color: #1A56C4;   /* Заданный цвет */
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .brand small {
      font-size: 0.75rem;
      font-weight: 400;
      color: #4a5568;
      margin-top: 3px;
    }

    /* Навигационное меню */
    .nav-links {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 24px;
      align-items: center;
    }
    .nav-links a, 
    .btn-donate-nav {
      text-decoration: none;
      color: #1A56C4;   /* Заданный цвет */
      font-weight: 700; /* Жирный шрифт */
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    .nav-links a:hover,
    .btn-donate-nav:hover {
      opacity: 0.8;
    }
    .nav-links a.active {
      border-bottom: 2px solid #1A56C4;
      padding-bottom: 4px;
    }
    .btn-donate-nav {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
    }

    /* Языковой переключатель */
    .nav-r {
      display: flex;
      align-items: center;
    }
    .lang-sw {
      display: flex;
      gap: 5px;
    }
    .lang-sw .lb {
      background: none;
      border: 1px solid #cbd5e0;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      transition: all 0.2s;
    }
    .lang-sw .lb.on {
      background-color: #1A56C4;
      color: #ffffff;
      border-color: #1A56C4;
    }

    /* Кнопка "Назад" */
    .back-link-container {
      max-width: 1200px;
      margin: 25px auto 0;
      padding: 0 20px;
      width: 100%;
      box-sizing: border-box;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: #1A56C4;   /* Заданный цвет */
      font-weight: 700; /* Жирный шрифт */
      font-size: 1rem;
      transition: opacity 0.2s;
    }
    .back-link:hover {
      opacity: 0.8;
    }

    /* Контейнер для будущих статей */
    .content-container {
      max-width: 1200px;
      margin: 30px auto 60px;
      padding: 0 20px;
      width: 100%;
      box-sizing: border-box;
      min-height: 400px; /* Оставляем пустым под будущие статьи */
    }
  </style>
</head>
<body>

  <!-- ШАПКА САЙТА (Все элементы в один ряд) -->
  <header class="header-nav">
    <!-- Левый угол: Логотип с флагами из интернета и пробелом перед текстом -->
    <a class="nav-logo" href="./index.html">
      <div class="flags-logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/49/Flag_of_Ukraine.svg" alt="UA Flag">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f3/Flag_of_Switzerland.svg" alt="CH Flag">
      </div>
      <span class="brand">
        UAGZ&nbsp;<small id="nav-sub">Український інтеграційний та громадський центр Цюриха</small>
      </span>
    </a>

    <!-- Центр: Навигационные ссылки (Все жирные, цвет #1A56C4) -->
    <ul class="nav-links">
      <li><a href="index.html" id="m-home" data-translate="m-home">Головна</a></li>
      <li><a href="events.html" id="m-events" data-translate="m-events">Заходи</a></li>
      <li><a href="knowledge.html" class="active" id="m-knowledge" data-translate="m-knowledge">Центр знань</a></li>
      <li><a href="volunteering.html" id="m-volunteering" data-translate="m-volunteering">Волонтерство</a></li>
      <li><button class="btn-donate-nav" id="m-donate" data-translate="m-donate">❤️ Донат</button></li>
      <li><a href="contacts.html" id="m-contacts" data-translate="m-contacts">Контакти</a></li>
    </ul>

    <!-- Правый угол: Переключатель языков -->
    <div class="nav-r">
      <div class="lang-sw">
        <button class="lb on" data-lang="ua" onclick="setLang('ua')">UA</button>
        <button class="lb" data-lang="de" onclick="setLang('de')">DE</button>
      </div>
    </div>
  </header>

  <!-- КНОПКА "НАЗАД" (Жирная, цвет #1A56C4, выровнена по левому краю) -->
  <div class="back-link-container">
    <a href="knowledge.html" class="back-link" data-translate="back_to_knowledge">
      &larr; Назад до Центр знань
    </a>
  </div>

  <!-- ПУСТОЙ КОНТЕЙНЕР ДЛЯ БУДУЩИХ СТАТЕЙ И ФОТО -->
  <main class="content-container" id="article-content">
    <!-- Сюда будем добавлять контент в следующих шагах -->
  </main>

  <!-- Логика смены активного класса языковых кнопок -->
  <script>
    function setLang(lang) {
      document.querySelectorAll('.lang-sw button').forEach(btn => btn.classList.remove('on'));
      const activeBtn = document.querySelector(`.lang-sw button[data-lang="${lang}"]`);
      if (activeBtn) {
        activeBtn.classList.add('on');
      }
      // Сюда при необходимости интегрируется ваша общая функция перевода переводчика
      if (typeof window.translatePage === 'function') {
        window.translatePage(lang);
      }
    }
  </script>

</body>
</html>
