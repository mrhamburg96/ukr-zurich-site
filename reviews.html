<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Відгуки — UAGZ</title>
  <style>
    :root {
      --primary: #004bd1;
      --primary-hover: #003699;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --bg-light: #f8f9fa;
      --border-color: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #ffffff;
      color: var(--text-main);
      line-height: 1.5;
    }

    /* Навігація (Шапка) */
    .nav-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border-color);
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav-logo img {
      height: 40px;
      display: block;
    }

    .nav-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--primary);
      font-weight: 600;
      font-size: 14px;
      transition: color 0.2s ease;
    }

    .nav-back-btn:hover {
      color: var(--primary-hover);
    }

   /* HERO-БЛОК С REVIEWS1.JPG: Головы больше не обрезаются */
    .reviews-hero {
      position: relative;
      width: 100%;
      height: 420px; /* Немного увеличили высоту, чтобы картинка раскрылась лучше */
      /* center 15% смещает фокус фотографии вверх, чтобы лица людей были видны полностью */
      background: url('reviews1.jpg') center 15%/cover no-repeat; 
      display: flex;
      align-items: flex-end; /* Смещаем контейнер к нижнему краю баннера */
      justify-content: center;
      margin-bottom: 0; /* Обнуляем, так как отступ теперь делает .container */
    }

    /* Удален псевдоэлемент .reviews-hero::before (затемняющий оверлей), */
    /* благодаря чему картинка остается оригинальной, яркой и без фильтров */

    /* ТЕКСТОВЫЙ БЛОК: Смещен под обрез баннера, фон полностью прозрачный */
    .hero-title-card {
      position: absolute;
      bottom: -20px; /* Прижимаем к самому низу */
      transform: translateY(100%); /* Выталкиваем блок строго ПОД обрез баннера на белое поле */
      z-index: 2;
      background: transparent !important; /* Убираем белый фон */
      backdrop-filter: none !important; /* Убираем размытие */
      -webkit-backdrop-filter: none !important;
      border: none !important; /* Убираем рамки */
      box-shadow: none !important; /* Убираем тени */
      text-align: center;
      max-width: 800px; /* Расширили строку, чтобы текст не сильно зажимался */
      margin: 0 auto;
      padding: 0;
    }

    .hero-title-card h1 {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary); /* Оставляем ваш фирменный синий */
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .hero-title-card p {
      font-size: 15px;
      color: var(--text-main); /* Темный текст, который теперь отлично читается на белом фоне */
      font-weight: 500;
    }

    /* Контейнер для контенту: Увеличен верхний отступ */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      /* padding-top: 100px дает достаточно места для текста, который мы сместили под баннер */
      padding: 100px 20px 80px 20px; 
    }

    /* Сетка для майбутніх відгуків */
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 30px;
    }

    /* Стилі для заглушки порожнього стану */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      border: 2px dashed var(--border-color);
      border-radius: 16px;
      background: var(--bg-light);
    }

    .empty-state-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .empty-state-desc {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Адаптивність */
    @media (max-width: 768px) {
      .nav-header {
        padding: 15px 20px;
      }
      .reviews-hero {
        height: 280px;
        margin-bottom: 40px;
      }
      .hero-title-card {
        padding: 20px 24px;
      }
      .hero-title-card h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <header class="nav-header">
    <div class="nav-logo">
      <a href="index.html">
        <img src="uagz-logo.png" alt="UAGZ Логотип">
      </a>
    </div>
    <a href="index.html" class="nav-back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      <span>На головну</span>
    </a>
  </header>

  <section class="reviews-hero">
    <div class="hero-title-card">
      <h1>Відгуки про UAGZ</h1>
      <p>Щирі історії людей, які отримали нашу підтримку та допомогу</p>
    </div>
  </section>

  <main class="container">
    <div class="reviews-grid">
      
      <div class="empty-state">
        <div class="empty-state-title">Розділ наповнюється</div>
        <div class="empty-state-desc">Найближчим часом тут з'являться щирі відгуки людей, які отримали нашу допомогу.</div>
      </div>

    </div>
  </main>

</body>
</html>
