<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Волонтерський центр UAGZ</title>
  <style>
    /* Базовые сбросы стилей */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #333;
    }

    /* ════════════════ СТИЛИ ШАПКИ (СКРИНШОТ 1) ════════════════ */
    .site-header {
      width: 100%;
      border-bottom: 1px solid #e2e8f0;
      background: #ffffff;
      padding: 15px 4%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    /* Левая часть: Логотип и текст */
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      max-width: 320px;
    }
    .brand-logo {
      width: 42px;
      height: auto;
    }
    .brand-text-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: #1A56C4;
      line-height: 1.1;
    }
    .brand-text-desc {
      font-size: 0.68rem;
      color: #718096;
      margin-top: 2px;
      line-height: 1.2;
    }

    /* Центр: Меню навигации */
    .header-nav {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }
    .nav-link {
      font-size: 0.92rem;
      font-weight: 600;
      color: #1A56C4;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-link:hover, .nav-link.active {
      color: #2b6cb0;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    /* Правая часть: Действия */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .btn-donate {
      background-color: #FFB800;
      color: #000000;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 8px 22px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-donate:hover {
      background-color: #e0a300;
    }

    /* Языковой переключатель */
    .lang-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .lang-item {
      text-decoration: none;
      color: #1A56C4;
      padding: 4px 6px;
    }
    .lang-item.active {
      background-color: #002060;
      color: #ffffff;
      border-radius: 3px;
    }

    /* Хлебные крошки под шапкой */
    .breadcrumbs {
      padding: 15px 4%;
      font-size: 0.8rem;
      color: #718096;
    }
    .breadcrumbs a {
      color: #1A56C4;
      text-decoration: none;
    }

    /* ════════════════ СТИЛИ ИНТЕРАКТИВНОГО БАННЕРА ════════════════ */
    .banner-container {
      position: relative;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }
    .banner-img {
      width: 100%;
      display: block;
      height: auto;
    }

    /* Прозрачные кликабельные области поверх картинки */
    .banner-link {
      position: absolute;
      background: rgba(255, 255, 255, 0); /* Абсолютно прозрачные */
      cursor: pointer;
      display: block;
      border-radius: 6px;
      transition: background 0.2s;
    }
    
    /* Подсветка зон при наведении для контроля расположения */
    .banner-link:hover {
      background: rgba(26, 86, 196, 0.1);
    }
  </style>
</head>
<body>

  <!-- БЛОК 1: ШАПКА САЙТА (По скриншоту 1) -->
  <header class="site-header">
    <!-- Логотип и название группы (Переход на главную) -->
    <a href="index.html" class="header-brand">
      <img src="Logo01.png" alt="UAGZ Logo" class="brand-logo">
      <div>
        <div class="brand-text-title">UAGZ</div>
        <div class="brand-text-desc">Український інтеграційний та громадський центр Цюриха</div>
      </div>
    </a>

    <!-- Навигационное меню -->
    <nav class="header-nav">
      <!-- Переход на главную -->
      <a href="index.html" class="nav-link">Головна</a>
      <a href="#" class="nav-link">Про центр</a>
      <a href="#" class="nav-link">Допомога</a>
      <a href="#" class="nav-link">Події</a>
      <a href="#" class="nav-link">Knowledge Center</a>
      <a href="#" class="nav-link">Оголошення</a>
      <a href="#" class="nav-link active">Волонтерство</a>
      <a href="#" class="nav-link">Контакти</a>
    </nav>

    <!-- Кнопка доната и языки -->
    <div class="header-actions">
      <a href="#donate" class="btn-donate">Donate</a>
      <div class="lang-switcher">
        <a href="?lang=ua" class="lang-item active">UA</a>
        <a href="?lang=de" class="lang-item">DE</a>
      </div>
    </div>
  </header>

  <div class="breadcrumbs">
    <a href="#">Головна</a> &gt; <a href="#">Наші центри</a> &gt; Волонтерський центр UAGZ
  </div>

  <main class="banner-container">
    <img src="volonter01.webp" alt="Волонтерський центр UAGZ" class="banner-img">

    <a href="#need-help" class="banner-link" title="Потрібна допомога" style="
      top: 29.3%;
      left: 3.3%;
      width: 17.1%;
      height: 4.8%;
    "></a>

    <a href="#give-help" class="banner-link" title="Допомогти" style="
      top: 29.3%;
      left: 22.1%;
      width: 13.9%;
      height: 4.8%;
    "></a>

    <a href="#contact-us" class="banner-link" title="Зв'язатися з нами" style="
      top: 94.7%;
      left: 59.9%;
      width: 28.0%;
      height: 4.3%;
    "></a>
  </main>

</body>
</html>
